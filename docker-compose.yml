version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: toystronautx-postgres
    environment:
      POSTGRES_DB: toystronautx
      POSTGRES_USER: toystronautx
      POSTGRES_PASSWORD: toystronautx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
